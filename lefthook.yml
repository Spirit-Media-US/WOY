# Lefthook pre-commit hooks
# Note: "astro check" is slow (~30s+) — run manually before deploy

pre-commit:
  commands:
    behind-remote:
      run: |
        git fetch --quiet
        LOCAL=$(git rev-parse @)
        REMOTE=$(git rev-parse @{u} 2>/dev/null || echo "")
        if [ -n "$REMOTE" ] && [ "$LOCAL" != "$REMOTE" ]; then
          BASE=$(git merge-base @ @{u})
          if [ "$LOCAL" = "$BASE" ]; then
            echo "❌ BLOCKED: Your branch is behind the remote. Run 'git pull' before committing."
            echo "   This prevents overwriting work from other sessions."
            exit 1
          fi
        fi
    biome:
      glob: "*.{js,ts,jsx,tsx,json,css,astro}"
      run: bunx biome check --write --staged --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  commands:
    perf-traits:
      run: /home/deploy/bin/perf-traits-audit.sh --hook
      skip:
        - merge
        - rebase
    block-main-push:
      run: |
        BRANCH=$(git rev-parse --abbrev-ref HEAD)
        if [ "$BRANCH" = "main" ]; then
          echo "❌ BLOCKED: Direct pushes to main are not allowed."
          echo "   Team: open a PR from dev → main for Kevin to approve."
          exit 1
        fi
      skip:
        - merge
        - rebase
    large-files:
      run: |
        MAX=5242880
        for file in $(git diff --cached --name-only); do
          [ -f "$file" ] || continue
          SIZE=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null)
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "❌ BLOCKED: $file is $(($SIZE / 1048576))MB — files over 5MB must go to R2 or Sanity, not git"
            exit 1
          fi
        done
      skip:
        - merge
        - rebase
