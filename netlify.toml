[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--prefer-offline"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# Branch preview deployments — full build, no www redirect
[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://cdn.sanity.io https://assets.spiritmediapublishing.com data:; connect-src 'self' https://u8tg0g1c.api.sanity.io; frame-ancestors 'self'"

# Sanity Studio static asset redirect
[[redirects]]
  from = "/static/*"
  to = "/studio/static/:splat"
  status = 200

# Redirect www to non-www
[[redirects]]
  from = "https://www.workonyourself.com/*"
  to = "https://workonyourself.com/:splat"
  status = 301
  force = true
